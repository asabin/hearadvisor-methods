<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" width="460" height="360">
  <style>
    text { font-family: Inter, -apple-system, sans-serif; }
    .axis-label { font-size: 11px; fill: #666; }
    .axis-title { font-size: 12px; fill: #444; font-weight: 500; }
    .eq-text { font-size: 11px; fill: #666; font-style: italic; }
    .grid { stroke: #e0e0e0; stroke-width: 0.5; }
    .axis-line { stroke: #999; stroke-width: 1; }
    @media (prefers-color-scheme: dark) {
      .axis-label { fill: #aaa; }
      .axis-title { fill: #ccc; }
      .eq-text { fill: #aaa; }
      .grid { stroke: #333; }
      .axis-line { stroke: #555; }
    }
  </style>

  <!-- Axes -->
  <line x1="60" y1="300" x2="400" y2="300" class="axis-line"/>
  <line x1="60" y1="20" x2="60" y2="300" class="axis-line"/>

  <!-- Y grid -->
  <line x1="60" y1="244" x2="400" y2="244" class="grid"/>
  <line x1="60" y1="188" x2="400" y2="188" class="grid"/>
  <line x1="60" y1="132" x2="400" y2="132" class="grid"/>
  <line x1="60" y1="76" x2="400" y2="76" class="grid"/>
  <line x1="60" y1="20" x2="400" y2="20" class="grid"/>

  <!-- Y labels -->
  <text x="52" y="304" text-anchor="end" class="axis-label">0</text>
  <text x="52" y="248" text-anchor="end" class="axis-label">2</text>
  <text x="52" y="192" text-anchor="end" class="axis-label">4</text>
  <text x="52" y="136" text-anchor="end" class="axis-label">6</text>
  <text x="52" y="80" text-anchor="end" class="axis-label">8</text>
  <text x="52" y="24" text-anchor="end" class="axis-label">10</text>

  <!-- Y title -->
  <text x="14" y="160" text-anchor="middle" class="axis-title" transform="rotate(-90, 14, 160)">Predicted Quality Rating</text>

  <!-- X grid -->
  <line x1="128" y1="20" x2="128" y2="300" class="grid"/>
  <line x1="196" y1="20" x2="196" y2="300" class="grid"/>
  <line x1="264" y1="20" x2="264" y2="300" class="grid"/>
  <line x1="332" y1="20" x2="332" y2="300" class="grid"/>
  <line x1="400" y1="20" x2="400" y2="300" class="grid"/>

  <!-- X labels -->
  <text x="60" y="318" text-anchor="middle" class="axis-label">0</text>
  <text x="128" y="318" text-anchor="middle" class="axis-label">1</text>
  <text x="196" y="318" text-anchor="middle" class="axis-label">2</text>
  <text x="264" y="318" text-anchor="middle" class="axis-label">3</text>
  <text x="332" y="318" text-anchor="middle" class="axis-label">4</text>
  <text x="400" y="318" text-anchor="middle" class="axis-label">5</text>

  <!-- X title -->
  <text x="230" y="345" text-anchor="middle" class="axis-title">D Value</text>

  <!-- Polynomial curve: y = 0.2x² - 3.1x + 10.5 -->
  <polyline fill="none" stroke="#7937CE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="
      73.6,23.1 80.4,31.5 87.2,39.8 94.0,48.0 100.8,56.1
      107.6,64.0 114.4,71.9 121.2,79.6 128.0,87.2 134.8,94.7
      141.6,102.1 148.4,109.4 155.2,116.5 162.0,123.6 168.8,130.5
      175.6,137.4 182.4,144.1 189.2,150.7 196.0,157.2 202.8,163.6
      209.6,169.9 216.4,176.0 223.2,182.1 230.0,188.0 236.8,193.8
      243.6,199.5 250.4,205.1 257.2,210.6 264.0,216.0 270.8,221.3
      277.6,226.4 284.4,231.5 291.2,236.4 298.0,241.2 304.8,245.9
      311.6,250.5 318.4,255.0 325.2,259.3 332.0,263.6 338.8,267.7
      345.6,271.8 352.4,275.7 359.2,279.5 366.0,283.2 372.8,286.8
      379.6,290.3 386.4,293.6 393.2,296.9 400.0,300.0
    "/>

  <!-- Equation label -->
  <text x="270" y="80" class="eq-text">y = 0.2x² − 3.1x + 10.5</text>
</svg>
