<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 380" width="620" height="380">
  <style>
    text { font-family: Inter, -apple-system, sans-serif; }
    .axis-label { font-size: 11px; fill: #666; }
    .axis-title { font-size: 12px; fill: #444; font-weight: 500; }
    .legend-text { font-size: 11px; fill: #444; }
    .grid { stroke: #e0e0e0; stroke-width: 0.5; }
    .axis-line { stroke: #999; stroke-width: 1; }
    @media (prefers-color-scheme: dark) {
      .axis-label { fill: #aaa; }
      .axis-title { fill: #ccc; }
      .legend-text { fill: #bbb; }
      .grid { stroke: #333; }
      .axis-line { stroke: #555; }
    }
  </style>

  <defs>
    <clipPath id="plot-area">
      <rect x="70" y="30" width="480" height="280"/>
    </clipPath>
  </defs>

  <!-- Axes -->
  <line x1="70" y1="310" x2="550" y2="310" class="axis-line"/>
  <line x1="70" y1="30" x2="70" y2="310" class="axis-line"/>

  <!-- Y grid lines: 0, 2, 4, 6, 8, 10, 12, 14, 16 dB -->
  <line x1="70" y1="278.9" x2="550" y2="278.9" class="grid"/>
  <line x1="70" y1="247.8" x2="550" y2="247.8" class="grid"/>
  <line x1="70" y1="216.7" x2="550" y2="216.7" class="grid"/>
  <line x1="70" y1="185.6" x2="550" y2="185.6" class="grid"/>
  <line x1="70" y1="154.4" x2="550" y2="154.4" class="grid"/>
  <line x1="70" y1="123.3" x2="550" y2="123.3" class="grid"/>
  <line x1="70" y1="92.2" x2="550" y2="92.2" class="grid"/>
  <line x1="70" y1="61.1" x2="550" y2="61.1" class="grid"/>
  <line x1="70" y1="30.0" x2="550" y2="30.0" class="grid"/>

  <!-- Y-axis labels -->
  <text x="62" y="283" text-anchor="end" class="axis-label">0</text>
  <text x="62" y="221" text-anchor="end" class="axis-label">4</text>
  <text x="62" y="158" text-anchor="end" class="axis-label">8</text>
  <text x="62" y="96" text-anchor="end" class="axis-label">12</text>
  <text x="62" y="34" text-anchor="end" class="axis-label">16</text>

  <!-- Y-axis title -->
  <text x="16" y="170" text-anchor="middle" class="axis-title" transform="rotate(-90, 16, 170)">Diffuse Field to Eardrum Difference (dB)</text>

  <!-- X grid lines at octave boundaries -->
  <line x1="132.8" y1="30" x2="132.8" y2="310" class="grid"/>
  <line x1="195.6" y1="30" x2="195.6" y2="310" class="grid"/>
  <line x1="278.6" y1="30" x2="278.6" y2="310" class="grid"/>
  <line x1="341.4" y1="30" x2="341.4" y2="310" class="grid"/>
  <line x1="404.2" y1="30" x2="404.2" y2="310" class="grid"/>
  <line x1="487.2" y1="30" x2="487.2" y2="310" class="grid"/>

  <!-- X-axis labels -->
  <text x="132.8" y="328" text-anchor="middle" class="axis-label">100</text>
  <text x="195.6" y="328" text-anchor="middle" class="axis-label">200</text>
  <text x="278.6" y="328" text-anchor="middle" class="axis-label">500</text>
  <text x="341.4" y="328" text-anchor="middle" class="axis-label">1k</text>
  <text x="404.2" y="328" text-anchor="middle" class="axis-label">2k</text>
  <text x="487.2" y="328" text-anchor="middle" class="axis-label">5k</text>
  <text x="550" y="328" text-anchor="middle" class="axis-label">10k</text>

  <!-- X-axis title -->
  <text x="310" y="355" text-anchor="middle" class="axis-title">Frequency (Hz)</text>

  <!-- HearAdvisor Lab curve (purple, solid) -->
  <polyline clip-path="url(#plot-area)" fill="none" stroke="#7937CE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="
      70.2,273.1
      91.1,272.8
      111.9,272.4
      132.8,271.7
      153.7,270.5
      174.5,268.7
      195.4,265.7
      216.2,260.7
      237.1,253.1
      258.0,242.0
      278.8,228.6
      299.7,215.0
      320.5,203.3
      341.4,195.5
      362.3,187.2
      383.1,167.1
      404.0,124.2
      424.8,75.3
      445.7,64.6
      466.6,81.8
      487.4,110.0
      508.3,167.2
      529.1,245.3
      550.0,272.5
    "/>

  <!-- Bentler & Pavlovic 1992 curve (gray, dashed) -->
  <polyline clip-path="url(#plot-area)" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="8,5" stroke-linecap="round" stroke-linejoin="round"
    points="
      175.4,278.9
      195.6,272.7
      215.8,271.1
      236.7,263.3
      258.4,258.7
      278.6,252.4
      299.5,244.7
      321.2,233.8
      341.4,219.8
      361.6,196.4
      384.0,166.9
      404.2,120.2
      424.4,47.1
      445.3,54.9
      467.0,78.2
      487.2,110.9
      508.1,143.6
      529.8,146.7
    "/>

  <!-- Legend box -->
  <rect x="355" y="38" width="185" height="48" rx="4" fill="white" fill-opacity="0.85" stroke="#ddd" stroke-width="0.5"/>
  <line x1="365" y1="53" x2="395" y2="53" stroke="#7937CE" stroke-width="2.5"/>
  <text x="402" y="57" class="legend-text">HearAdvisor Lab</text>
  <line x1="365" y1="73" x2="395" y2="73" stroke="#888888" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="402" y="77" class="legend-text">Bentler &amp; Pavlovic 1992</text>
</svg>
