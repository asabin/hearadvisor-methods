<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 460" width="320" height="460">
  <style>
    text { font-family: Inter, -apple-system, sans-serif; }
    .axis-label { font-size: 10px; fill: #666; }
    .axis-title { font-size: 11px; fill: #444; font-weight: 500; }
    .panel-label { font-size: 16px; fill: #333; font-weight: 700; }
    .grid { stroke: #e0e0e0; stroke-width: 0.5; }
    .axis-line { stroke: #999; stroke-width: 1; }
    @media (prefers-color-scheme: dark) {
      .axis-label { fill: #aaa; }
      .axis-title { fill: #ccc; }
      .panel-label { fill: #ddd; }
      .grid { stroke: #333; }
      .axis-line { stroke: #555; }
      circle { fill: #ccc; }
    }
  </style>

  <!-- ===== PANEL A ===== -->
  <!-- Plot area: x=[80,280], y=[20,170], X:-20..0, Y:0..10 -->
  <text x="70" y="18" class="panel-label">A</text>

  <!-- Axes -->
  <line x1="80" y1="170" x2="280" y2="170" class="axis-line"/>
  <line x1="80" y1="20" x2="80" y2="170" class="axis-line"/>

  <!-- Y grid -->
  <line x1="80" y1="140" x2="280" y2="140" class="grid"/>
  <line x1="80" y1="110" x2="280" y2="110" class="grid"/>
  <line x1="80" y1="80" x2="280" y2="80" class="grid"/>
  <line x1="80" y1="50" x2="280" y2="50" class="grid"/>
  <line x1="80" y1="20" x2="280" y2="20" class="grid"/>

  <!-- Y labels -->
  <text x="72" y="174" text-anchor="end" class="axis-label">0</text>
  <text x="72" y="144" text-anchor="end" class="axis-label">2</text>
  <text x="72" y="114" text-anchor="end" class="axis-label">4</text>
  <text x="72" y="84" text-anchor="end" class="axis-label">6</text>
  <text x="72" y="54" text-anchor="end" class="axis-label">8</text>
  <text x="72" y="24" text-anchor="end" class="axis-label">10</text>

  <!-- Y title -->
  <text x="22" y="95" text-anchor="middle" class="axis-title" transform="rotate(-90, 22, 95)">Avg. Subjective Occlusion</text>

  <!-- X labels -->
  <text x="80" y="186" text-anchor="middle" class="axis-label">-20</text>
  <text x="130" y="186" text-anchor="middle" class="axis-label">-15</text>
  <text x="180" y="186" text-anchor="middle" class="axis-label">-10</text>
  <text x="230" y="186" text-anchor="middle" class="axis-label">-5</text>
  <text x="280" y="186" text-anchor="middle" class="axis-label">0</text>

  <!-- X title -->
  <text x="180" y="202" text-anchor="middle" class="axis-title">REOG 2-4 kHz (dB)</text>

  <!-- Fit line -->
  <line x1="80" y1="75.5" x2="280" y2="158" stroke="#888" stroke-width="1.5" opacity="0.5"/>

  <!-- Data points -->
  <circle cx="150" cy="110" r="5" fill="currentColor"/>
  <circle cx="180" cy="120.5" r="5" fill="currentColor"/>
  <circle cx="190" cy="125" r="5" fill="currentColor"/>
  <circle cx="210" cy="132.5" r="5" fill="currentColor"/>
  <circle cx="230" cy="135.5" r="5" fill="currentColor"/>
  <circle cx="270" cy="155" r="5" fill="currentColor"/>


  <!-- ===== PANEL B ===== -->
  <!-- Plot area: x=[80,280], y=[230,410], X:-5..15, Y:-30..5 -->
  <text x="70" y="228" class="panel-label">B</text>

  <!-- Axes -->
  <line x1="80" y1="410" x2="280" y2="410" class="axis-line"/>
  <line x1="80" y1="230" x2="80" y2="410" class="axis-line"/>

  <!-- Y grid: -30 to 5 in steps of 5 -->
  <!-- py = 410 - (v-(-30)) * (180/35) = 410 - (v+30)*5.143 -->
  <line x1="80" y1="384.3" x2="280" y2="384.3" class="grid"/>
  <line x1="80" y1="358.6" x2="280" y2="358.6" class="grid"/>
  <line x1="80" y1="332.9" x2="280" y2="332.9" class="grid"/>
  <line x1="80" y1="307.1" x2="280" y2="307.1" class="grid"/>
  <line x1="80" y1="281.4" x2="280" y2="281.4" class="grid"/>
  <line x1="80" y1="255.7" x2="280" y2="255.7" class="grid"/>
  <line x1="80" y1="230.0" x2="280" y2="230.0" class="grid"/>

  <!-- Y labels -->
  <text x="72" y="414" text-anchor="end" class="axis-label">-30</text>
  <text x="72" y="388" text-anchor="end" class="axis-label">-25</text>
  <text x="72" y="362" text-anchor="end" class="axis-label">-20</text>
  <text x="72" y="336" text-anchor="end" class="axis-label">-15</text>
  <text x="72" y="310" text-anchor="end" class="axis-label">-10</text>
  <text x="72" y="284" text-anchor="end" class="axis-label">-5</text>
  <text x="72" y="258" text-anchor="end" class="axis-label">0</text>
  <text x="72" y="234" text-anchor="end" class="axis-label">5</text>

  <!-- Y title -->
  <text x="22" y="320" text-anchor="middle" class="axis-title" transform="rotate(-90, 22, 320)">REOG 2-4 kHz (dB)</text>

  <!-- X labels -->
  <text x="80" y="426" text-anchor="middle" class="axis-label">-5</text>
  <text x="130" y="426" text-anchor="middle" class="axis-label">0</text>
  <text x="180" y="426" text-anchor="middle" class="axis-label">5</text>
  <text x="230" y="426" text-anchor="middle" class="axis-label">10</text>
  <text x="280" y="426" text-anchor="middle" class="axis-label">15</text>

  <!-- X title -->
  <text x="180" y="445" text-anchor="middle" class="axis-title">Avg. Objective Occlusion 250-500 Hz (dB)</text>

  <!-- Fit line -->
  <line x1="100" y1="230" x2="270" y2="389.7" stroke="#888" stroke-width="1.5" opacity="0.5"/>

  <!-- Data points -->
  <circle cx="130" cy="258.3" r="5" fill="currentColor"/>
  <circle cx="140" cy="281.4" r="5" fill="currentColor"/>
  <circle cx="150" cy="278.9" r="5" fill="currentColor"/>
  <circle cx="170" cy="296.9" r="5" fill="currentColor"/>
  <circle cx="180" cy="317.4" r="5" fill="currentColor"/>
  <circle cx="185" cy="314.9" r="5" fill="currentColor"/>
  <circle cx="200" cy="332.9" r="5" fill="currentColor"/>
  <circle cx="205" cy="340.6" r="5" fill="currentColor"/>
  <circle cx="210" cy="348.3" r="5" fill="currentColor"/>
  <circle cx="220" cy="356" r="5" fill="currentColor"/>
  <circle cx="225" cy="361.1" r="5" fill="currentColor"/>
  <circle cx="240" cy="363.7" r="5" fill="currentColor"/>
  <circle cx="250" cy="386.9" r="5" fill="currentColor"/>
  <circle cx="260" cy="389.4" r="5" fill="currentColor"/>
</svg>
